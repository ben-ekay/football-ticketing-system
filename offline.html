<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a2540">
    <title>Offline — GoalTicket</title>
    <link rel="icon" type="image/png" href="/goalticket/assets/icons/icon-192.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Bebas+Neue&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a2540 0%, #1a3a6e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Diagonal stripes background */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: repeating-linear-gradient(
                135deg,
                transparent,
                transparent 40px,
                rgba(255, 255, 255, 0.025) 40px,
                rgba(255, 255, 255, 0.025) 80px
            );
            pointer-events: none;
        }

        .offline-container {
            text-align: center;
            max-width: 500px;
            position: relative;
            z-index: 2;
        }

        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            line-height: 1;
        }

        h1 span {
            color: #00d4ff;
        }

        p {
            font-size: 17px;
            opacity: 0.85;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #00d4ff;
            color: #0a2540;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
            box-shadow: 0 4px 14px rgba(0, 212, 255, 0.35);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .hint {
            margin-top: 25px;
            font-size: 13px;
            opacity: 0.6;
        }

        @media (max-width: 500px) {
            h1 { font-size: 38px; }
            p { font-size: 15px; }
            .offline-icon { font-size: 60px; }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're <span>offline</span></h1>
        <p>
            GoalTicket needs an internet connection to load matchday data.
            Your saved tickets are still available when you're back online.
        </p>
        <button class="btn" onclick="window.location.reload()">Try again</button>
        <p class="hint">Tip: tickets purchased before going offline are stored on your device.</p>
    </div>

    <script>
        // Auto-retry when connection is restored
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</body>
</html>
